<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CampKit</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green-dark  : #1B4332;
  --green-mid   : #2D6A4F;
  --green-light : #52B788;
  --green-pale  : #B7E4C7;
  --red-soft    : #FEE2E2;
  --red-border  : #FCA5A5;
  --red-text    : #DC2626;
  --gray-100    : #F3F4F6;
  --gray-200    : #E5E7EB;
  --gray-400    : #9CA3AF;
  --gray-600    : #6B7280;
  --gray-900    : #111827;
  --radius-sm   : 8px;
  --radius-md   : 12px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Segoe UI', sans-serif;
  background: #EEF4EE;
  color: var(--gray-900);
  min-height: 100dvh;
}

/* ── Header ────────────────────────────────────────────── */
.header {
  background: var(--green-mid);
  color: #fff;
  padding: 18px 16px 16px;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 2px 8px rgba(0,0,0,.18);
}
.header-title {
  font-size: 17px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 10px;
}
.overall-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.prog-track {
  flex: 1;
  background: rgba(255,255,255,.25);
  border-radius: 99px;
  height: 7px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: var(--green-pale);
  border-radius: 99px;
  transition: width .35s ease;
}
.prog-label {
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  min-width: 82px;
  text-align: right;
}

/* ── Filter bar ─────────────────────────────────────────── */
.filter-bar {
  background: #fff;
  display: flex;
  border-bottom: 1px solid var(--gray-200);
  position: sticky;
  top: 82px;
  z-index: 199;
}
.ftab {
  flex: 1;
  text-align: center;
  padding: 11px 0;
  font-size: 14px;
  font-weight: 500;
  color: var(--gray-600);
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: color .15s, border-color .15s;
  user-select: none;
}
.ftab.on {
  color: var(--green-mid);
  border-bottom-color: var(--green-mid);
}

/* ── Content ────────────────────────────────────────────── */
.content {
  padding: 12px 12px 88px;
  max-width: 640px;
  margin: 0 auto;
}

/* ── Bag card ───────────────────────────────────────────── */
.bag-card {
  background: #fff;
  border-radius: var(--radius-md);
  margin-bottom: 10px;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,.07);
}
.bag-head {
  display: flex;
  align-items: center;
  padding: 13px 14px;
  cursor: pointer;
  user-select: none;
  gap: 8px;
}
.bag-icon  { font-size: 20px; flex-shrink: 0; }
.bag-name  { font-size: 15px; font-weight: 600; flex: 1; }
.bag-count { font-size: 13px; color: var(--gray-600); margin-right: 2px; }
.bag-caret {
  font-size: 11px;
  color: var(--gray-400);
  transition: transform .2s;
}
.bag-card.closed .bag-caret { transform: rotate(-90deg); }

.bag-prog-track {
  height: 3px;
  background: var(--gray-100);
}
.bag-prog-fill {
  height: 100%;
  background: var(--green-light);
  transition: width .35s ease;
}

.bag-items { }
.bag-card.closed .bag-items { display: none; }

/* ── Item row ───────────────────────────────────────────── */
.item-row {
  display: flex;
  align-items: flex-start;
  padding: 11px 14px;
  border-top: 1px solid var(--gray-100);
  gap: 11px;
  transition: opacity .2s;
}
.item-row.no-need { opacity: .38; }

/* checkbox */
.chk {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: 2px solid var(--gray-200);
  background: #fff;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 1px;
  transition: background .15s, border-color .15s;
}
.chk.on {
  background: var(--green-mid);
  border-color: var(--green-mid);
}
.chk.on::after {
  content: '';
  display: block;
  width: 5px;
  height: 9px;
  border: 2px solid #fff;
  border-top: none;
  border-left: none;
  transform: rotate(42deg) translateY(-1px);
}

/* text */
.item-body { flex: 1; min-width: 0; }
.item-name {
  font-size: 15px;
  line-height: 1.35;
  word-break: break-word;
  transition: color .15s, text-decoration .15s;
}
.item-row.packed .item-name {
  text-decoration: line-through;
  color: var(--gray-400);
}
.item-note {
  font-size: 12px;
  color: var(--gray-400);
  margin-top: 3px;
  word-break: break-word;
}

/* no-need button */
.nn-btn {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 99px;
  border: 1px solid var(--gray-200);
  color: var(--gray-600);
  background: #fff;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .15s, border-color .15s, color .15s;
  -webkit-tap-highlight-color: transparent;
}
.nn-btn.on {
  background: var(--red-soft);
  border-color: var(--red-border);
  color: var(--red-text);
}

/* ── Loading / empty ────────────────────────────────────── */
.center-msg {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 60dvh;
  gap: 14px;
  color: var(--gray-600);
  font-size: 15px;
}
.spinner {
  width: 34px; height: 34px;
  border: 3px solid var(--gray-200);
  border-top-color: var(--green-mid);
  border-radius: 50%;
  animation: spin .75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty-section {
  padding: 18px 14px;
  font-size: 13px;
  color: var(--gray-400);
  text-align: center;
}
</style>
</head>
<body>
<div id="app">
  <div class="center-msg"><div class="spinner"></div><span>載入中…</span></div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────
var API  = '<?= ScriptApp.getService().getUrl() ?>';
var filter   = 'all';   // all | active | unpacked
var items    = [];
var bagOrder = [];
var tripName = 'CampKit';

var BAG_ICONS = {
  '露營用品':'⛺','睡眠用品':'🛏️','燈具':'💡',
  '鍋具':'🍳','個人用品':'🎒','食材':'🥩'
};
function icon(bag){ return BAG_ICONS[bag] || '📦'; }

// ── API ───────────────────────────────────────────────────────
function apiFetch(action, body){
  if(action === 'get_checklist'){
    return fetch(API + '?action=get_checklist').then(function(r){ return r.json(); });
  }
  return fetch(API, {
    method: 'POST',
    body: JSON.stringify(Object.assign({ action: action }, body))
  }).then(function(r){ return r.json(); });
}

// ── Render ────────────────────────────────────────────────────
function visibleItems(list){
  return list.filter(function(it){
    if(filter === 'active')   return !it.noNeed;
    if(filter === 'unpacked') return !it.noNeed && !it.packed;
    return true;
  });
}

function pct(n, d){ return d === 0 ? 0 : Math.round(n / d * 100); }

function esc(s){
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render(){
  var activeAll  = items.filter(function(it){ return !it.noNeed; });
  var packedAll  = activeAll.filter(function(it){ return it.packed; });
  var totalPct   = pct(packedAll.length, activeAll.length);

  // ── Header
  var h = '<div class="header">';
  h += '<div class="header-title">' + esc(tripName) + '</div>';
  h += '<div class="overall-row">';
  h += '<div class="prog-track"><div class="prog-fill" style="width:' + totalPct + '%"></div></div>';
  h += '<div class="prog-label">' + packedAll.length + ' / ' + activeAll.length + '（' + totalPct + '%）</div>';
  h += '</div></div>';

  // ── Filter bar
  h += '<div class="filter-bar">';
  [['all','全部'],['active','要帶'],['unpacked','未打包']].forEach(function(f){
    h += '<div class="ftab' + (filter===f[0]?' on':'') + '" onclick="setFilter(\'' + f[0] + '\')">' + f[1] + '</div>';
  });
  h += '</div>';

  // ── Content
  h += '<div class="content">';

  bagOrder.forEach(function(bag){
    var bagAll    = items.filter(function(it){ return it.bag === bag; });
    var visible   = visibleItems(bagAll);
    if(visible.length === 0) return;

    var bagActive = bagAll.filter(function(it){ return !it.noNeed; });
    var bagPacked = bagActive.filter(function(it){ return it.packed; });
    var bagPct    = pct(bagPacked.length, bagActive.length);
    var bagId     = 'bag_' + bag.replace(/\W/g,'_');

    h += '<div class="bag-card" id="' + bagId + '">';

    // bag header
    h += '<div class="bag-head" onclick="toggleBag(\'' + bagId + '\')">';
    h += '<span class="bag-icon">' + icon(bag) + '</span>';
    h += '<span class="bag-name">' + esc(bag) + '</span>';
    h += '<span class="bag-count">' + bagPacked.length + '/' + bagActive.length + '</span>';
    h += '<span class="bag-caret">▼</span>';
    h += '</div>';

    // bag progress bar
    h += '<div class="bag-prog-track"><div class="bag-prog-fill" style="width:' + bagPct + '%"></div></div>';

    // items
    h += '<div class="bag-items">';
    visible.forEach(function(it){
      var cls = 'item-row' + (it.noNeed?' no-need':'') + (it.packed?' packed':'');
      h += '<div class="' + cls + '" id="r' + it.rowIndex + '">';
      h += '<div class="chk' + (it.packed?' on':'') + '" onclick="togglePacked(' + it.rowIndex + ')"></div>';
      h += '<div class="item-body">';
      h += '<div class="item-name">' + esc(it.item) + '</div>';
      if(it.note) h += '<div class="item-note">📍 ' + esc(it.note) + '</div>';
      h += '</div>';
      h += '<button class="nn-btn' + (it.noNeed?' on':'') + '" onclick="toggleNoNeed(' + it.rowIndex + ')">不帶</button>';
      h += '</div>';
    });

    if(visible.length === 0){
      h += '<div class="empty-section">沒有符合條件的項目</div>';
    }

    h += '</div></div>'; // bag-items + bag-card
  });

  h += '</div>'; // content
  document.getElementById('app').innerHTML = h;
}

// ── Actions ───────────────────────────────────────────────────
function setFilter(f){ filter = f; render(); }

function toggleBag(id){
  var el = document.getElementById(id);
  if(el) el.classList.toggle('closed');
}

function findItem(rowIndex){
  for(var i=0; i<items.length; i++){
    if(items[i].rowIndex === rowIndex) return items[i];
  }
  return null;
}

function togglePacked(rowIndex){
  var it = findItem(rowIndex);
  if(!it || it.noNeed) return;
  it.packed = !it.packed;
  render();
  apiFetch('toggle_packed', { rowIndex: rowIndex, value: it.packed });
}

function toggleNoNeed(rowIndex){
  var it = findItem(rowIndex);
  if(!it) return;
  it.noNeed = !it.noNeed;
  if(it.noNeed) it.packed = false; // auto-unpack when marking "不帶"
  render();
  var noNeedVal = it.noNeed;
  apiFetch('toggle_no_need', { rowIndex: rowIndex, value: noNeedVal }).then(function(){
    if(noNeedVal){
      apiFetch('toggle_packed', { rowIndex: rowIndex, value: false });
    }
  });
}

// ── Init ──────────────────────────────────────────────────────
apiFetch('get_checklist').then(function(resp){
  if(!resp.ok){
    document.getElementById('app').innerHTML =
      '<div class="center-msg">⚠️ 載入失敗，請重新整理</div>';
    return;
  }
  items    = resp.data.items;
  bagOrder = resp.data.bags;
  tripName = resp.data.tripName || 'CampKit';
  document.title = tripName;
  render();
}).catch(function(){
  document.getElementById('app').innerHTML =
    '<div class="center-msg">⚠️ 網路錯誤，請重新整理</div>';
});
</script>
</body>
</html>
